<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Writing Buddy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="desktop" aria-label="Writing website preview">
        <section class="window buddy-list" aria-labelledby="buddy-list-title">
            <header class="title-bar">
                <div class="title-bar__label">
                    <img class="runner-icon" src="assets/runner-glyph.svg" alt="">
                    <span id="buddy-list-title">Buddy List</span>
                </div>
                <div class="window-controls" aria-hidden="true">
                    <span class="window-button">_</span>
                    <span class="window-button">□</span>
                    <span class="window-button">x</span>
                </div>
            </header>

            <nav class="menu-bar" aria-label="Buddy List menus">
                <span>Edit</span>
                <span>View</span>
                <span>People</span>
                <span>Help</span>
            </nav>


            <div class="buddy-tabs" aria-label="Buddy List tabs">
                <span class="buddy-tab buddy-tab--active">Online</span>
                <span class="buddy-tab">List Setup</span>
            </div>

            <div class="buddy-list__body">
                <div class="user-strip">
                    <img class="user-strip__icon" src="assets/profile-pic.svg" alt="Profile picture for hareem">
                    <div>
                        <p class="screen-name">hareem</p>
                        <p class="status-line"><span class="status-light" aria-hidden="true"></span> online</p>
                    </div>
                </div>

                <div id="buddy-groups" class="buddy-pane" role="list" aria-label="Writing groups">
                    <p class="loading-note">Loading buddy list...</p>
                </div>

                <button id="away-message-button" class="away-message-button" type="button">
                    <strong>Away Message</strong>
                    <span>product &amp; design at squint AI</span>
                </button>

                <div class="buddy-actions" aria-hidden="true">
                    <button type="button">IM</button>
                    <button type="button">Info</button>
                    <button type="button">Away</button>
                    <button type="button">Prefs</button>
                </div>
            </div>
        </section>

        <section id="window-layer" class="window-layer" aria-label="Open writing windows"></section>
    </main>

    <script src="script.js"></script>
</body>
</html>
